<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">ZM Studio 用户核心体验流程图</title>
  <desc id="desc">一张展示 ZM Studio 主线旅程与支撑能力的用户核心体验流程 SVG。</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040608" />
      <stop offset="50%" stop-color="#0a1020" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <radialGradient id="glowA" cx="20%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowB" cx="80%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    </pattern>

    <linearGradient id="mainCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>

    <linearGradient id="supportCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e5edf6" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.28" />
    </filter>

    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#e2e8f0" />
    </marker>

    <marker id="arrowSoft" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#94a3b8" />
    </marker>

    <style>
      text {
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      }

      .eyebrow {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .title {
        font-size: 48px;
        font-weight: 700;
      }

      .subtitle {
        font-size: 22px;
        font-weight: 400;
      }

      .section-label {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 1.5px;
      }

      .card-number {
        font-size: 18px;
        font-weight: 700;
      }

      .card-title {
        font-size: 22px;
        font-weight: 700;
      }

      .card-body {
        font-size: 16px;
        font-weight: 400;
      }

      .support-title {
        font-size: 22px;
        font-weight: 700;
      }

      .support-body {
        font-size: 16px;
        font-weight: 400;
      }

      .footer-note {
        font-size: 18px;
        font-weight: 500;
      }
    </style>
  </defs>

  <rect width="1800" height="1040" fill="url(#bg)" />
  <rect width="1800" height="1040" fill="url(#grid)" opacity="0.2" />
  <circle cx="320" cy="180" r="360" fill="url(#glowA)" />
  <circle cx="1470" cy="120" r="280" fill="url(#glowB)" />

  <g transform="translate(80 70)">
    <text class="eyebrow" fill="#93c5fd">ZM STUDIO</text>
    <text class="title" x="0" y="66" fill="#f8fafc">用户核心体验流程图</text>
    <text class="subtitle" x="0" y="108" fill="#cbd5e1">从项目入口进入，在同一个连续空间里组织信息、与 AI 和团队推进决策，并把上下文持续沉淀下来。</text>
  </g>

  <g transform="translate(80 160)">
    <rect width="150" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" />
    <text class="section-label" x="22" y="27" fill="#f8fafc">主线旅程</text>
  </g>

  <g transform="translate(80 210)">
    <path d="M 185 90 H 205" stroke="#e2e8f0" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 390 90 H 410" stroke="#e2e8f0" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 595 90 H 615" stroke="#e2e8f0" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 800 90 H 820" stroke="#e2e8f0" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 1005 90 H 1025" stroke="#e2e8f0" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 1210 90 H 1230" stroke="#e2e8f0" stroke-width="3" fill="none" marker-end="url(#arrow)" />
    <path d="M 1415 90 H 1435" stroke="#e2e8f0" stroke-width="3" fill="none" marker-end="url(#arrow)" />

    <g filter="url(#shadow)">
      <rect width="185" height="180" rx="28" fill="url(#mainCard)" stroke="#5b708f" />
      <rect x="20" y="18" width="54" height="54" rx="27" fill="#f59e0b" opacity="0.18" />
      <circle cx="47" cy="45" r="20" fill="#f59e0b" />
      <text class="card-number" x="40" y="52" fill="#111827">1</text>
      <text class="card-title" x="22" y="102" fill="#f8fafc">开屏进入</text>
      <text class="card-body" x="22" y="132" fill="#cbd5e1">建立入口印象</text>
      <text class="card-body" x="22" y="154" fill="#cbd5e1">完成进入动作</text>
    </g>

    <g filter="url(#shadow)" transform="translate(205 0)">
      <rect width="185" height="180" rx="28" fill="url(#mainCard)" stroke="#5b708f" />
      <rect x="20" y="18" width="54" height="54" rx="27" fill="#fb7185" opacity="0.18" />
      <circle cx="47" cy="45" r="20" fill="#fb7185" />
      <text class="card-number" x="40" y="52" fill="#111827">2</text>
      <text class="card-title" x="22" y="102" fill="#f8fafc">进入项目台账</text>
      <text class="card-body" x="22" y="132" fill="#cbd5e1">定位目标项目</text>
      <text class="card-body" x="22" y="154" fill="#cbd5e1">进入项目上下文</text>
    </g>

    <g filter="url(#shadow)" transform="translate(410 0)">
      <rect width="185" height="180" rx="28" fill="url(#mainCard)" stroke="#5b708f" />
      <rect x="20" y="18" width="54" height="54" rx="27" fill="#f97316" opacity="0.18" />
      <circle cx="47" cy="45" r="20" fill="#f97316" />
      <text class="card-number" x="40" y="52" fill="#111827">3</text>
      <text class="card-title" x="22" y="102" fill="#f8fafc">打开项目画布</text>
      <text class="card-body" x="22" y="132" fill="#cbd5e1">进入工作现场</text>
      <text class="card-body" x="22" y="154" fill="#cbd5e1">不是空白起步</text>
    </g>

    <g filter="url(#shadow)" transform="translate(615 0)">
      <rect width="185" height="180" rx="28" fill="url(#mainCard)" stroke="#5b708f" />
      <rect x="20" y="18" width="54" height="54" rx="27" fill="#22c55e" opacity="0.18" />
      <circle cx="47" cy="45" r="20" fill="#22c55e" />
      <text class="card-number" x="40" y="52" fill="#111827">4</text>
      <text class="card-title" x="22" y="102" fill="#f8fafc">空间化组织信息</text>
      <text class="card-body" x="22" y="132" fill="#cbd5e1">节点连线分组</text>
      <text class="card-body" x="22" y="154" fill="#cbd5e1">缩放整理思路</text>
    </g>

    <g filter="url(#shadow)" transform="translate(820 0)">
      <rect width="185" height="180" rx="28" fill="url(#mainCard)" stroke="#5b708f" />
      <rect x="20" y="18" width="54" height="54" rx="27" fill="#14b8a6" opacity="0.18" />
      <circle cx="47" cy="45" r="20" fill="#14b8a6" />
      <text class="card-number" x="40" y="52" fill="#111827">5</text>
      <text class="card-title" x="22" y="102" fill="#f8fafc">AI Copilot 共创</text>
      <text class="card-body" x="22" y="132" fill="#cbd5e1">理解当前上下文</text>
      <text class="card-body" x="22" y="154" fill="#cbd5e1">直接改板推进</text>
    </g>

    <g filter="url(#shadow)" transform="translate(1025 0)">
      <rect width="185" height="180" rx="28" fill="url(#mainCard)" stroke="#5b708f" />
      <rect x="20" y="18" width="54" height="54" rx="27" fill="#38bdf8" opacity="0.18" />
      <circle cx="47" cy="45" r="20" fill="#38bdf8" />
      <text class="card-number" x="40" y="52" fill="#111827">6</text>
      <text class="card-title" x="22" y="102" fill="#f8fafc">团队实时协同</text>
      <text class="card-body" x="22" y="132" fill="#cbd5e1">看见彼此编辑</text>
      <text class="card-body" x="22" y="154" fill="#cbd5e1">选区与状态</text>
    </g>

    <g filter="url(#shadow)" transform="translate(1230 0)">
      <rect width="185" height="180" rx="28" fill="url(#mainCard)" stroke="#5b708f" />
      <rect x="20" y="18" width="54" height="54" rx="27" fill="#60a5fa" opacity="0.18" />
      <circle cx="47" cy="45" r="20" fill="#60a5fa" />
      <text class="card-number" x="40" y="52" fill="#111827">7</text>
      <text class="card-title" x="22" y="102" fill="#f8fafc">沉淀项目记忆</text>
      <text class="card-body" x="22" y="132" fill="#cbd5e1">保存偏好决策</text>
      <text class="card-body" x="22" y="154" fill="#cbd5e1">记录阶段成果</text>
    </g>

    <g filter="url(#shadow)" transform="translate(1435 0)">
      <rect width="185" height="180" rx="28" fill="url(#mainCard)" stroke="#5b708f" />
      <rect x="20" y="18" width="54" height="54" rx="27" fill="#a78bfa" opacity="0.18" />
      <circle cx="47" cy="45" r="20" fill="#a78bfa" />
      <text class="card-number" x="40" y="52" fill="#111827">8</text>
      <text class="card-title" x="22" y="102" fill="#f8fafc">下次继续推进</text>
      <text class="card-body" x="22" y="132" fill="#cbd5e1">带着上下文继续</text>
      <text class="card-body" x="22" y="154" fill="#cbd5e1">不是重新开始</text>
    </g>
  </g>

  <g transform="translate(80 560)">
    <rect width="180" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" />
    <text class="section-label" x="22" y="27" fill="#f8fafc">支撑能力</text>
  </g>

  <g transform="translate(0 0)">
    <path d="M 260 780 C 260 690, 360 650, 377 390" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="10 12" marker-end="url(#arrowSoft)" />
    <path d="M 680 780 C 680 700, 800 660, 1007 390" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="10 12" marker-end="url(#arrowSoft)" />
    <path d="M 1100 780 C 1100 700, 1260 660, 1312 390" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="10 12" marker-end="url(#arrowSoft)" />
    <path d="M 1520 780 C 1520 700, 1660 660, 1722 390" stroke="#94a3b8" stroke-width="3" fill="none" stroke-dasharray="10 12" marker-end="url(#arrowSoft)" />

    <g filter="url(#shadow)" transform="translate(110 620)">
      <rect width="300" height="200" rx="30" fill="url(#supportCard)" stroke="#cbd5e1" />
      <rect x="22" y="20" width="82" height="8" rx="4" fill="#fb7185" />
      <text class="support-title" x="24" y="72" fill="#0f172a">项目数据底座</text>
      <text class="support-body" x="24" y="110" fill="#334155">项目、客户、预算、状态</text>
      <text class="support-body" x="24" y="132" fill="#334155">统一入口与项目上下文</text>
    </g>

    <g filter="url(#shadow)" transform="translate(530 620)">
      <rect width="300" height="200" rx="30" fill="url(#supportCard)" stroke="#cbd5e1" />
      <rect x="22" y="20" width="82" height="8" rx="4" fill="#22c55e" />
      <text class="support-title" x="24" y="72" fill="#0f172a">资产与参考内容</text>
      <text class="support-body" x="24" y="110" fill="#334155">资产库、筛选、问答</text>
      <text class="support-body" x="24" y="132" fill="#334155">为用户和 AI 提供依据</text>
    </g>

    <g filter="url(#shadow)" transform="translate(950 620)">
      <rect width="300" height="200" rx="30" fill="url(#supportCard)" stroke="#cbd5e1" />
      <rect x="22" y="20" width="82" height="8" rx="4" fill="#38bdf8" />
      <text class="support-title" x="24" y="72" fill="#0f172a">实时协同底座</text>
      <text class="support-body" x="24" y="110" fill="#334155">实时同步、Presence、快照</text>
      <text class="support-body" x="24" y="132" fill="#334155">让推进过程持续可见</text>
    </g>

    <g filter="url(#shadow)" transform="translate(1370 620)">
      <rect width="300" height="200" rx="30" fill="url(#supportCard)" stroke="#cbd5e1" />
      <rect x="22" y="20" width="82" height="8" rx="4" fill="#a78bfa" />
      <text class="support-title" x="24" y="72" fill="#0f172a">长期记忆与持久化</text>
      <text class="support-body" x="24" y="110" fill="#334155">Project / Board Memory</text>
      <text class="support-body" x="24" y="132" fill="#334155">让下次协作无缝续上</text>
    </g>
  </g>

  <g transform="translate(80 930)">
    <line x1="0" y1="0" x2="1640" y2="0" stroke="rgba(255,255,255,0.14)" />
    <text class="footer-note" x="0" y="40" fill="#cbd5e1">讲述方式：先讲主线旅程，再讲底层支撑能力，最后收束到“项目上下文持续积累的协同工作空间”。</text>
  </g>
</svg>
