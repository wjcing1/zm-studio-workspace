<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZM Studio secure sign-in." />
    <meta name="theme-color" content="#050505" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZM Studio" />
    <title>ZM Studio Login</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/app-icon.svg" />
    <link rel="stylesheet" href="./styles/shared.css?v=2026-03-30-auth-2" />
    <link rel="stylesheet" href="./styles/login.css?v=2026-03-30-auth-2" />
    <script src="./scripts/shared/auth.js?v=2026-03-30-auth-2"></script>
  </head>
  <body data-page="zm-login">
    <main class="login-shell">
      <section class="login-card" aria-label="Login panel">
        <div class="login-card-head">
          <h1>登录</h1>
        </div>

        <form class="login-form" id="loginForm">
          <label class="login-field" for="loginUsername">
            <input id="loginUsername" name="username" class="login-input" type="text" autocomplete="username" placeholder="用户名" />
          </label>

          <label class="login-field" for="loginPassword">
            <input
              id="loginPassword"
              name="password"
              class="login-input"
              type="password"
              autocomplete="current-password"
              placeholder="密码"
            />
          </label>

          <button class="login-submit" id="loginSubmit" type="submit">登录</button>
        </form>

        <div class="login-status" id="loginStatus" role="status" aria-live="polite">
          请输入用户名和密码。
        </div>
      </section>
    </main>

    <script type="module" src="./scripts/login-page.js?v=2026-03-30-auth-2"></script>
  </body>
</html>
