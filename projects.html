<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZM Studio project ledger." />
    <meta name="theme-color" content="#050505" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZM Studio" />
    <title>ZM Studio Projects</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/app-icon.svg" />
    <script src="./scripts/shared/auth.js?v=2026-03-30-auth-3"></script>
    <script src="./scripts/shared/auth-guard.js?v=2026-03-30-auth-3"></script>
    <link rel="stylesheet" href="./styles/shared.css?v=2026-03-30-auth-1" />
    <link rel="stylesheet" href="./styles/projects.css" />
  </head>
  <body data-page="zm-projects">
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="./workspace.html" aria-label="Open workspace">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 19 7v10l-7 4-7-4V7Z"></path>
          </svg>
          <span class="brand-name">zm studio</span>
        </a>

        <nav class="nav" aria-label="Studio pages">
          <a class="nav-link" href="./workspace.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="4" width="7" height="7" rx="1.5"></rect>
              <rect x="3" y="13" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="13" width="7" height="7" rx="1.5"></rect>
            </svg>
            Workspace
          </a>
          <a class="nav-link is-active" href="./projects.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <ellipse cx="12" cy="5.5" rx="7" ry="3"></ellipse>
              <path d="M5 5.5v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"></path>
              <path d="M5 11.5v7c0 1.7 3.1 3 7 3s7-1.3 7-3v-7"></path>
            </svg>
            Projects
          </a>
          <a class="nav-link" href="./assets.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7.5 12 3l9 4.5-9 4.5Z"></path>
              <path d="M3 12l9 4.5 9-4.5"></path>
              <path d="M3 16.5 12 21l9-4.5"></path>
            </svg>
            Assets
          </a>
        </nav>

        <div class="session-cluster" aria-label="Session actions">
          <div class="session-chip" data-auth-session-label>Studio Access</div>
          <button class="session-link" type="button" data-auth-logout>Log Out</button>
        </div>
      </header>

      <main class="page-main" aria-label="Projects page">
        <div class="section-wrap">
          <div class="section-head">
            <div>
              <div class="section-kicker">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                  <ellipse cx="12" cy="5.5" rx="7" ry="3"></ellipse>
                  <path d="M5 5.5v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"></path>
                  <path d="M5 11.5v7c0 1.7 3.1 3 7 3s7-1.3 7-3v-7"></path>
                </svg>
                <h1>Project Ledger.</h1>
              </div>
              <p class="section-copy">
                Centralized database for client projects, budgets, and team allocations.
              </p>
            </div>
            <div class="status-chip">
              <span class="status-dot"></span>
              <span id="projectStatus">System Online • 0 Records</span>
            </div>
          </div>

          <div class="data-grid">
            <div class="grid-head">
              <div>ID</div>
              <div>Project / Client</div>
              <div>Status</div>
              <div>Budget</div>
              <div>Manager &amp; Team</div>
            </div>
            <div id="projectRows"></div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./scripts/projects-page.js?v=2026-03-30-auth-1"></script>
  </body>
</html>
