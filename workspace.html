<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZM Studio internal workspace canvas." />
    <meta name="theme-color" content="#050505" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZM Studio" />
    <title>ZM Studio Workspace</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/app-icon.svg" />
    <link rel="stylesheet" href="./styles/shared.css?v=2026-03-27-nav-1" />
    <link rel="stylesheet" href="./styles/workspace.css?v=2026-03-28-workspace-copilot-1" />
  </head>
  <body data-page="zm-workspace">
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="./workspace.html" aria-label="Open workspace">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 19 7v10l-7 4-7-4V7Z"></path>
          </svg>
          <span class="brand-name">zm studio</span>
        </a>

        <nav class="nav" aria-label="Studio pages">
          <a class="nav-link is-active" href="./workspace.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="4" width="7" height="7" rx="1.5"></rect>
              <rect x="3" y="13" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="13" width="7" height="7" rx="1.5"></rect>
            </svg>
            Workspace
          </a>
          <a class="nav-link" href="./projects.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <ellipse cx="12" cy="5.5" rx="7" ry="3"></ellipse>
              <path d="M5 5.5v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"></path>
              <path d="M5 11.5v7c0 1.7 3.1 3 7 3s7-1.3 7-3v-7"></path>
            </svg>
            Projects
          </a>
          <a class="nav-link" href="./assets.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7.5 12 3l9 4.5-9 4.5Z"></path>
              <path d="M3 12l9 4.5 9-4.5"></path>
              <path d="M3 16.5 12 21l9-4.5"></path>
            </svg>
            Assets
          </a>
        </nav>
      </header>

      <main class="workspace-shell">
        <section aria-label="Workspace canvas">
          <div class="canvas-viewport" id="canvasViewport">
            <div class="canvas-overlay">
              <div class="canvas-context-shell panel-surface">
                <div class="canvas-context-top">
                  <button class="canvas-context-back" id="canvasBackBtn" type="button" hidden>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="m15 18-6-6 6-6"></path>
                    </svg>
                    Back To Overview
                  </button>
                  <div class="canvas-breadcrumb" id="canvasBreadcrumb">Canvas / Overview</div>
                </div>
                <div class="canvas-context-body">
                  <div>
                    <div class="canvas-context-kicker" id="canvasContextKicker">Studio Canvas</div>
                    <h1 class="canvas-context-title" id="canvasContextTitle" hidden></h1>
                    <p class="canvas-context-copy" id="canvasContextCopy">
                      A spatial snapshot of the studio's current body of work.
                    </p>
                  </div>
                  <div class="canvas-context-meta" id="canvasContextMeta"></div>
                </div>
              </div>
              <button class="canvas-context-toggle panel-surface" id="canvasContextToggle" type="button" hidden>
                <span class="canvas-context-toggle-icon" aria-hidden="true"></span>
                <span id="canvasContextToggleLabel">Show Overview</span>
              </button>
              <div class="canvas-toolbar panel-surface" id="canvasToolbar" aria-label="Canvas tools">
                <button class="canvas-tool-btn" id="addTextNodeBtn" type="button">Text</button>
                <button class="canvas-tool-btn" id="addLinkNodeBtn" type="button">Link</button>
                <button class="canvas-tool-btn" id="addGroupNodeBtn" type="button">Group</button>
                <button class="canvas-tool-btn" id="undoCanvasBtn" type="button">Undo</button>
                <button class="canvas-tool-btn" id="redoCanvasBtn" type="button">Redo</button>
                <button class="canvas-tool-btn" id="canvasImportBtn" type="button">Import</button>
                <button class="canvas-tool-btn" id="canvasExportBtn" type="button">Export</button>
              </div>
            </div>
            <div class="canvas-grid" id="canvasGrid"></div>
            <svg class="canvas-connections" id="canvasConnections" aria-hidden="true"></svg>
            <div class="canvas-stage" id="canvasStage"></div>
            <div class="marquee-selection" id="marqueeSelection" hidden></div>

            <button
              class="assistant-companion panel-surface"
              id="assistantCompanion"
              type="button"
              aria-haspopup="dialog"
              aria-controls="workspaceAssistantPanel"
            >
              <span class="assistant-companion-dot" aria-hidden="true"></span>
              <span id="assistantCompanionLabel">AI Nearby</span>
            </button>

            <aside class="workspace-assistant panel-surface" id="workspaceAssistantPanel" hidden aria-label="Workspace assistant">
              <div class="workspace-assistant-head">
                <div>
                  <div class="assistant-kicker">Canvas Copilot</div>
                  <h2 class="workspace-assistant-title">Think With The Board</h2>
                </div>
                <button class="workspace-assistant-close" id="assistantCloseBtn" type="button">Close</button>
              </div>
              <p class="workspace-assistant-copy" id="assistantContextSummary">
                The assistant follows your cursor and prioritizes nearby cards, selected nodes, and connected context.
              </p>
              <div class="assistant-starters" id="assistantStarters"></div>
              <div class="assistant-thread" id="assistantMessages"></div>
              <form class="assistant-composer" id="assistantComposer">
                <textarea
                  class="assistant-input"
                  id="assistantInput"
                  name="assistantInput"
                  placeholder="Ask the assistant to extend, summarize, group, or reorganize the nearby canvas..."
                ></textarea>
                <button class="assistant-send" id="assistantSend" type="submit">Apply With AI</button>
              </form>
              <div class="assistant-status" id="assistantStatus">Workspace AI ready.</div>
            </aside>

            <input
              id="canvasImportInput"
              type="file"
              accept=".canvas,.json,application/json"
              hidden
            />

            <div class="canvas-hud">
              <div class="hud-pill" id="zoomValue">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 3H3v5"></path>
                  <path d="M16 3h5v5"></path>
                  <path d="M8 21H3v-5"></path>
                  <path d="M21 16v5h-5"></path>
                </svg>
                <span>100%</span>
              </div>
              <button class="hud-btn" id="resetViewBtn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m8 3 8 9-5 1 2 8-8-9 5-1Z"></path>
                </svg>
                Reset View
              </button>
              <button class="hud-btn" id="assistantToggleBtn" type="button">AI Panel</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./scripts/workspace-page.js?v=2026-03-28-workspace-copilot-1"></script>
  </body>
</html>
