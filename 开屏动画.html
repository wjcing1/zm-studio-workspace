<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZM Studio Web App splash screen." />
    <meta name="theme-color" content="#050505" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZM Studio" />
    <title>ZM Studio Splash</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/app-icon.svg" />
    <link rel="stylesheet" href="./styles/splash.css" />
  </head>
  <body data-page="zm-splash">
    <main class="splash-shell" data-target-page="./workspace.html">
      <canvas id="splashCanvas" class="splash-canvas" aria-hidden="true"></canvas>
      <div class="splash-vignette"></div>

      <div class="splash-copy">
        <p class="splash-kicker">Portfolio Workspace</p>
        <p class="splash-note">Opening the studio environment. The intro will continue automatically, or you can enter early.</p>
      </div>

      <a id="enterStudioButton" class="splash-cta" href="./workspace.html">Enter Studio</a>

      <noscript>
        <div class="noscript-note">
          JavaScript is disabled. Continue to the main workspace:
          <a href="./workspace.html">Enter Studio</a>
        </div>
      </noscript>
    </main>

    <script type="module" src="./splash.js?v=2026-03-29-pages-1"></script>
  </body>
</html>
